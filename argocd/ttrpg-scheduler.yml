apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ttrpg-scheduler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/m-gora/ttrpg-discord-app.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ttrpg-scheduler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ttrpg-scheduler-app
      jsonPointers:
        - /data
